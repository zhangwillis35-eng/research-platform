services:
  grobid:
    image: lfoppiano/grobid:0.8.1
    container_name: scholarflow-grobid
    restart: always
    ports:
      - "127.0.0.1:8070:8070"
    environment:
      - JAVA_OPTS=-Xmx512m -Xms128m
    deploy:
      resources:
        limits:
          memory: 768M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8070/api/isalive"]
      start_period: 180s
      interval: 30s
      timeout: 10s
      retries: 5

  app:
    build: .
    container_name: scholarflow
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - GROBID_URL=http://grobid:8070
    deploy:
      resources:
        limits:
          memory: 4G
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
